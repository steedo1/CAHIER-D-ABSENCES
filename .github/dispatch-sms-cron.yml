name: Dispatch SMS Cron

on:
  schedule:
    - cron: "*/5 * * * *"   # toutes les 5 min
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cron-dispatch-sms
  cancel-in-progress: false

jobs:
  call-sms-dispatch:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      # Exemple: https://mon-cahier.com/api/sms/dispatch
      PROD_SMS_URL: ${{ secrets.PROD_SMS_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Check secrets presence
        run: |
          test -n "$PROD_SMS_URL" || { echo "::error::Missing PROD_SMS_URL secret"; exit 1; }
          test -n "$CRON_SECRET"  || { echo "::error::Missing CRON_SECRET secret"; exit 1; }

      - name: Resolve host (DNS) for visibility
        shell: bash
        run: |
          set -euo pipefail
          URL="$(echo "$PROD_SMS_URL" | tr -d '[:space:]')"
          HOST="${URL#*://}"; HOST="${HOST%%/*}"
          echo "URL : $URL"
          echo "Host: $HOST"
          getent hosts "$HOST" || echo "No getent record for $HOST"

      - name: Call SMS dispatch endpoint
        shell: bash
        run: |
          set -euo pipefail
          set +x
          URL="$(echo "$PROD_SMS_URL" | tr -d '[:space:]')"

          call() {
            local URL="$1"
            local MODE="${2:-x-cron}"  # x-cron | bearer
            echo "POST $URL (mode=$MODE)"

            local -a AUTH
            if [ "$MODE" = "bearer" ]; then
              AUTH=(-H "Authorization: Bearer $CRON_SECRET")
            else
              AUTH=(-H "x-cron-secret: $CRON_SECRET")
            fi

            CODE=$(
              curl -sS -L --post301 --post302 --post303 \
                --retry 3 --retry-delay 2 --retry-connrefused \
                --connect-timeout 10 --max-time 25 \
                -o /tmp/resp.txt -w "%{http_code}" \
                -X POST "$URL" \
                "${AUTH[@]}" \
                -H "x-vercel-cron: 1" \
                -H "Content-Type: application/json" \
                -H "User-Agent: gh-actions-sms-cron" \
                --data '{"source":"github-actions-sms"}' \
              || true
            )

            echo "HTTP $CODE"
            echo "----- Response body (2KB max) -----"
            head -c 2048 /tmp/resp.txt || true; echo
            echo "-----------------------------------"

            [[ "$CODE" -ge 200 && "$CODE" -lt 300 ]]
          }

          # 1) direct x-cron-secret
          if call "$URL" x-cron; then exit 0; fi

          # 2) fallback bearer
          echo "Retry with Authorization: Bearer"
          if call "$URL" bearer; then exit 0; fi

          # 3) fallback apex <-> www
          HOST="${URL#*://}"; HOST="${HOST%%/*}"
          if [[ "$HOST" == www.* ]]; then
            ALT_HOST="${HOST#www.}"
          else
            ALT_HOST="www.$HOST"
          fi
          SWAP="${URL/$HOST/$ALT_HOST}"

          echo "Retry with swapped host: $SWAP"
          if call "$SWAP" x-cron; then exit 0; fi

          # 4) dernier essai swapped + bearer
          echo "Retry swapped host with Authorization: Bearer"
          if call "$SWAP" bearer; then exit 0; fi

          echo "::error::Failed after retries (see body above)"
          exit 1